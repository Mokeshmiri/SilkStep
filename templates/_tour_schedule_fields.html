{# shared weekly schedule + duration fields for new_tour / edit_tour #}
<div class="mb-3">
  <label class="form-label">Weekly schedule</label>
  <p class="text-muted small">Tick the days this tour runs and set a start time for each one.</p>

  {% for idx, name in weekdays %}
  <div class="d-flex align-items-center gap-2 mb-1">
    <div class="form-check schedule-day">
      <input class="form-check-input" type="checkbox"
             name="txt_day_{{ idx }}" value="1" id="day_{{ idx }}"
             {% if idx in schedule_map %}checked{% endif %}>
      <label class="form-check-label" for="day_{{ idx }}">{{ name }}</label>
    </div>
    <input type="time" name="txt_time_{{ idx }}" class="form-control schedule-time"
           value="{{ schedule_map[idx] if idx in schedule_map else '10:00' }}">
  </div>
  {% endfor %}
</div>

<div class="mb-3 schedule-day">
  <label class="form-label">Duration (minutes)</label>
  <input type="number" name="txt_duration_minutes" class="form-control"
         min="15" max="720" step="15"
         value="{{ duration_minutes or 120 }}" required>
  <p class="text-muted small mb-0">total length of the tour in minutes (e.g. 120 = 2 hours)</p>
</div>
