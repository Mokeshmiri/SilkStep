{% extends "base.html" %}
{% block title %}Tours | SilkStep{% endblock %}

{% block content %}
<section class="container py-5">
  <h1 class="mb-4">Popular tours in Tehran</h1>

  <div class="row g-4">
    {% for tour in tours %}
    <div class="col-md-4">
      <div class="card tour-card h-100">
        <div class="card-body">
          <span class="badge bg-success mb-2">Free tour</span>
          <h2 class="h5">{{ tour.title }}</h2>
          <p class="text-muted small">{{ tour.schedule }}</p>
          <p>{{ tour.summary }}</p>
          <a href="#" class="btn btn-outline-primary btn-sm">View tour</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
