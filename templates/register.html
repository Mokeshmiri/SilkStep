{% extends "base.html" %}
{% block title %}Register | SilkStep{% endblock %}

{% block content %}
<section class="container py-5" style="max-width: 520px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-4 text-center">Create account</h1>

      {% if form_error %}
        <div class="alert alert-danger">{{ form_error }}</div>
      {% endif %}

      {# self-register — always creates participant role #}
      <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
          <label class="form-label">First name</label>
          <input type="text" name="txt_name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Last name</label>
          <input type="text" name="txt_surname" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="txt_email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="txt_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
      </form>

      <hr class="my-4">

      <p class="text-center text-muted mb-0">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
