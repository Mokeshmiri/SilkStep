{% extends "base.html" %}
{% block title %}Register | SilkStep{% endblock %}

{% block content %}
<section class="container py-5" style="max-width: 520px;">
  <h1 class="mb-4">Create account</h1>
  <form method="POST" action="{{ url_for('register') }}">
    <div class="mb-3">
      <label class="form-label">First name</label>
      <input type="text" name="txt_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Last name</label>
      <input type="text" name="txt_surname" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="txt_email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="txt_password" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Register as</label>
      <select name="txt_role" class="form-select" required>
        <option value="participant">Participant</option>
        <option value="guide">Guide</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
  </form>
</section>
<p class="mt-3">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>

{% endblock %}
