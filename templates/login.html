{% extends "base.html" %}
{% block title %}Login | SilkStep{% endblock %}

{% block content %}
<section class="container py-5 mw-480">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-4">Login</h1>

      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('do_login') }}">
        <div class="mb-3">
          <label class="form-label text-uppercase small text-muted">Email address</label>
          <input type="email" name="txt_email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label text-uppercase small text-muted">Password</label>
          <input type="password" name="txt_password" class="form-control" required>
        </div>

        <div class="text-end mb-3">
          <a href="{{ url_for('forgot_password') }}" class="small">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100">Log in</button>
      </form>

      <hr class="my-4">

      <div class="d-flex justify-content-between align-items-center">
        <span class="text-muted">Don't have an account?</span>
        <a href="{{ url_for('signup') }}" class="btn btn-outline-primary btn-sm">Create</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
