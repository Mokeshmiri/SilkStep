{% extends "base.html" %}
{% block title %}Change password | SilkStep{% endblock %}

{% block content %}
<section class="container py-5 mw-520">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-4 text-center">Change password</h1>

      {% if form_error %}
        <div class="alert alert-danger">{{ form_error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('change_password') }}">
        <div class="mb-3">
          <label class="form-label">Current password</label>
          <input type="password" name="txt_current_password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">New password</label>
          <input type="password" name="txt_new_password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm new password</label>
          <input type="password" name="txt_confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Update password</button>
      </form>

      <hr class="my-4">

      <p class="text-center mb-0">
        <a href="{{ url_for('profile') }}">← Back to profile</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
